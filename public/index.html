<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>Ollama Code — LAN</title>
  <style>
    * { box-sizing: border-box; }
    :root {
      --bg: #1a1a2e;
      --surface: #16213e;
      --accent: #7c3aed;
      --accent-dim: #6d28d9;
      --text: #e2e8f0;
      --text-dim: #94a3b8;
      --green: #22c55e;
      --red: #ef4444;
    }
    body {
      margin: 0;
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    header {
      padding: 0.75rem 1rem;
      background: var(--surface);
      border-bottom: 1px solid rgba(124,58,237,0.3);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 0.5rem;
    }
    h1 { margin: 0; font-size: 1.1rem; color: var(--accent); }
    .session-row {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      flex-wrap: wrap;
    }
    input, select, button {
      padding: 0.4rem 0.6rem;
      border-radius: 6px;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(0,0,0,0.2);
      color: var(--text);
      font-size: 0.9rem;
    }
    input { flex: 1; min-width: 120px; }
    button {
      background: var(--accent);
      border: none;
      cursor: pointer;
      font-weight: 600;
    }
    button:hover { background: var(--accent-dim); }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 1rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }
    .msg {
      max-width: 90%;
      padding: 0.75rem 1rem;
      border-radius: 10px;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .msg.user {
      align-self: flex-end;
      background: var(--accent);
      color: white;
    }
    .msg.assistant {
      align-self: flex-start;
      background: var(--surface);
      border: 1px solid rgba(255,255,255,0.08);
    }
    .msg.system { align-self: center; color: var(--text-dim); font-size: 0.85rem; }
    .progress-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      padding: 0.5rem;
      background: rgba(0,0,0,0.2);
      border-radius: 8px;
      margin: 0.5rem 0;
      font-size: 0.85rem;
      color: var(--text-dim);
    }
    .progress-step { color: var(--green); }
    .input-area {
      padding: 1rem;
      background: var(--surface);
      border-top: 1px solid rgba(255,255,255,0.08);
      display: flex;
      gap: 0.5rem;
      align-items: flex-end;
    }
    #input {
      flex: 1;
      min-height: 44px;
      max-height: 120px;
      resize: none;
    }
    #send { min-height: 44px; }
    .sessions-list {
      position: absolute;
      top: 100%;
      left: 0;
      right: 0;
      background: var(--surface);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      max-height: 200px;
      overflow-y: auto;
      z-index: 10;
      margin-top: 4px;
    }
    .sessions-list button {
      display: block;
      width: 100%;
      text-align: left;
      padding: 0.6rem 1rem;
      background: none;
      border: none;
      border-radius: 0;
      font-weight: normal;
    }
    .sessions-list button:hover { background: rgba(124,58,237,0.2); }
    .relative { position: relative; }
    @media (max-width: 480px) {
      header { flex-direction: column; align-items: stretch; }
      .msg { max-width: 95%; }
    }
  </style>
</head>
<body>
  <header>
    <h1>Ollama Code</h1>
    <div class="session-row relative">
      <input type="text" id="sessionId" placeholder="Session ID (new or existing)">
      <button id="newSession">New</button>
      <button id="loadSessions">Sessions</button>
      <div id="sessionsDropdown" class="sessions-list" style="display:none"></div>
      <select id="model">
        <option value="">Loading...</option>
      </select>
    </div>
  </header>
  <div id="chat"></div>
  <div class="input-area">
    <textarea id="input" placeholder="Type a task..." rows="2"></textarea>
    <button id="send">Send</button>
  </div>

  <script>
    const API = '';
    const chat = document.getElementById('chat');
    const input = document.getElementById('input');
    const sendBtn = document.getElementById('send');
    const sessionIdInput = document.getElementById('sessionId');
    const modelSelect = document.getElementById('model');
    const sessionsDropdown = document.getElementById('sessionsDropdown');

    function addMsg(role, content) {
      const div = document.createElement('div');
      div.className = `msg ${role}`;
      div.textContent = content;
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
    }

    function addProgress(steps) {
      let el = document.getElementById('progress-bar');
      if (!el) {
        el = document.createElement('div');
        el.id = 'progress-bar';
        el.className = 'progress-bar';
        chat.appendChild(el);
      }
      el.innerHTML = steps.map(s => `<span class="progress-step">Step ${s.step}</span> ${s.label}`).join(' · ');
      chat.scrollTop = chat.scrollHeight;
    }

    function addToken(t) {
      let el = document.getElementById('streaming-msg');
      if (!el) {
        el = document.createElement('div');
        el.id = 'streaming-msg';
        el.className = 'msg assistant';
        chat.appendChild(el);
      }
      el.textContent = (el.textContent || '') + t;
      chat.scrollTop = chat.scrollHeight;
    }

    function finishStreaming() {
      const el = document.getElementById('streaming-msg');
      if (el) {
        el.id = '';
      }
    }

    function uuid() {
      return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c => {
        const r = Math.random() * 16 | 0;
        const v = c === 'x' ? r : (r & 0x3 | 0x8);
        return v.toString(16);
      });
    }

    document.getElementById('newSession').onclick = () => {
      sessionIdInput.value = uuid();
      chat.innerHTML = '';
      addMsg('system', 'New session. Start typing.');
    };

    document.getElementById('loadSessions').onclick = async () => {
      try {
        const res = await fetch(API + '/api/sessions');
        const { sessions } = await res.json();
        sessionsDropdown.innerHTML = sessions.length ? sessions.map(s =>
          `<button data-id="${s.sessionId}">${s.name || s.sessionId.slice(0, 8)} — ${s.model}</button>`
        ).join('') : '<button disabled>No sessions</button>';
        sessionsDropdown.style.display = 'block';
        sessionsDropdown.querySelectorAll('button[data-id]').forEach(b => {
          b.onclick = () => {
            sessionIdInput.value = b.dataset.id;
            sessionsDropdown.style.display = 'none';
            loadSession(b.dataset.id);
          };
        });
      } catch (e) {
        addMsg('system', 'Failed to load sessions: ' + e.message);
      }
    };

    sessionsDropdown.addEventListener('mouseleave', () => { sessionsDropdown.style.display = 'none'; });

    async function loadSession(id) {
      try {
        const res = await fetch(API + '/api/sessions/' + encodeURIComponent(id));
        if (!res.ok) return;
        const { messages } = await res.json();
        chat.innerHTML = '';
        (messages || []).filter(m => m.role !== 'system').forEach(m => addMsg(m.role, m.content));
      } catch (e) {
        addMsg('system', 'Failed to load: ' + e.message);
      }
    }

    async function loadModels() {
      try {
        const res = await fetch(API + '/api/models');
        const { models, current } = await res.json();
        modelSelect.innerHTML = (models || []).map(m =>
          `<option value="${m.name}" ${m.name === current ? 'selected' : ''}>${m.name}</option>`
        ).join('');
      } catch {
        modelSelect.innerHTML = '<option>Default</option>';
      }
    }

    document.getElementById('send').onclick = send;
    input.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
    });

    async function send() {
      const msg = input.value.trim();
      if (!msg) return;
      let sid = sessionIdInput.value.trim();
      if (!sid) {
        sid = uuid();
        sessionIdInput.value = sid;
      }

      addMsg('user', msg);
      input.value = '';
      sendBtn.disabled = true;

      const progressSteps = [];
      try {
        const res = await fetch(API + '/api/sessions/' + encodeURIComponent(sid) + '/message', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: msg, model: modelSelect.value || undefined }),
        });
        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          throw new Error(err.error || res.statusText);
        }

        const reader = res.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '';
        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          buffer += decoder.decode(value, { stream: true });
          const lines = buffer.split('\n');
          buffer = lines.pop() || '';
          for (const line of lines) {
            if (!line.trim()) continue;
            try {
              const ev = JSON.parse(line);
              if (ev.type === 'progress') {
                progressSteps.push(ev);
                addProgress(progressSteps);
              } else if (ev.type === 'token') {
                addToken(ev.text || '');
              } else if (ev.type === 'tool') {
                progressSteps.push({ step: ev.step || progressSteps.length + 1, label: ev.tool + ': ' + (ev.detail || '').slice(0, 40) });
                addProgress(progressSteps);
              } else if (ev.type === 'done') {
                finishStreaming();
                const pb = document.getElementById('progress-bar');
                if (pb) pb.remove();
              } else if (ev.type === 'messages' && ev.messages) {
                const last = ev.messages.filter(m => m.role === 'assistant').pop();
                if (last && !document.getElementById('streaming-msg')) addMsg('assistant', last.content);
              } else if (ev.type === 'error') {
                addMsg('system', 'Error: ' + (ev.message || 'Unknown'));
              }
            } catch (_) {}
          }
        }
      } catch (e) {
        addMsg('system', 'Error: ' + e.message);
      }
      sendBtn.disabled = false;
    }

    loadModels();
    if (sessionIdInput.value) loadSession(sessionIdInput.value);
  </script>
</body>
</html>
