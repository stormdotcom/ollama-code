<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>Ollama Code — LAN</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
  <style>
    * { box-sizing: border-box; }
    :root {
      --bg: #0f0f12;
      --surface: #18181c;
      --surface-elevated: #1f1f24;
      --accent: #8b5cf6;
      --accent-hover: #7c3aed;
      --text: #fafafa;
      --text-secondary: #a1a1aa;
      --text-muted: #71717a;
      --border: rgba(255,255,255,0.08);
      --green: #22c55e;
      --yellow: #eab308;
      --red: #ef4444;
      --radius: 12px;
      --radius-sm: 8px;
      --header-h: 56px;
      --input-h: 48px;
      --safe-bottom: env(safe-area-inset-bottom, 0);
    }
    body {
      margin: 0;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      -webkit-tap-highlight-color: transparent;
    }

    /* ── Header (mobile-first: hamburger + title + model) ──────────────────── */
    .header {
      height: var(--header-h);
      min-height: var(--header-h);
      padding: 0 12px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .header-left, .header-center, .header-right {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .header-center { flex: 1; justify-content: center; min-width: 0; }
    .menu-btn {
      width: 44px;
      height: 44px;
      border: none;
      background: none;
      color: var(--text);
      cursor: pointer;
      border-radius: var(--radius-sm);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
    }
    .menu-btn:hover { background: var(--surface-elevated); }
    .menu-btn svg { width: 24px; height: 24px; }
    .brand {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--accent);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .tabs {
      display: flex;
      background: var(--surface-elevated);
      border-radius: 999px;
      padding: 4px;
    }
    .tab {
      padding: 8px 16px;
      border: none;
      background: none;
      color: var(--text-secondary);
      font-size: 0.9rem;
      font-weight: 500;
      border-radius: 999px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .tab.active { background: var(--accent); color: white; }
    .tab:not(.active):hover { color: var(--text); }
    .tab svg { width: 18px; height: 18px; opacity: 0.9; }
    .model-wrap {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .model-label {
      font-size: 0.8rem;
      color: var(--text-muted);
      white-space: nowrap;
    }
    .model-select {
      padding: 8px 12px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      background: var(--surface-elevated);
      color: var(--text);
      font-size: 0.85rem;
      max-width: 160px;
      cursor: pointer;
    }
    .sidebar-model {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
    }
    .sidebar-label {
      display: block;
      font-size: 0.8rem;
      color: var(--text-muted);
      margin-bottom: 6px;
    }
    .model-select-sidebar {
      width: 100%;
      padding: 10px 12px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      background: var(--surface-elevated);
      color: var(--text);
      font-size: 0.9rem;
      cursor: pointer;
    }
    .avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: var(--accent);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: 600;
      font-size: 0.9rem;
    }

    /* ── Sidebar (drawer for sessions) ────────────────────────────────────── */
    .sidebar-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 200;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.2s, visibility 0.2s;
    }
    .sidebar-overlay.open { opacity: 1; visibility: visible; }
    .sidebar {
      position: fixed;
      top: 0;
      left: 0;
      width: min(300px, 85vw);
      height: 100%;
      height: 100dvh;
      background: var(--surface);
      border-right: 1px solid var(--border);
      z-index: 201;
      transform: translateX(-100%);
      transition: transform 0.25s ease;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .sidebar.open { transform: translateX(0); }
    .sidebar-header {
      padding: 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .sidebar-header h2 { margin: 0; font-size: 1rem; font-weight: 600; }
    .sidebar-close {
      width: 40px;
      height: 40px;
      border: none;
      background: none;
      color: var(--text);
      cursor: pointer;
      border-radius: var(--radius-sm);
      font-size: 1.5rem;
      line-height: 1;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .sidebar-close:hover { background: var(--surface-elevated); }
    .sidebar-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
    }
    .sidebar-item {
      display: block;
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: var(--radius-sm);
      background: none;
      color: var(--text);
      text-align: left;
      font-size: 0.9rem;
      cursor: pointer;
      margin-bottom: 4px;
    }
    .sidebar-item:hover { background: var(--surface-elevated); }
    .sidebar-item small { display: block; color: var(--text-muted); font-size: 0.8rem; margin-top: 2px; }

    /* ── Chat area ────────────────────────────────────────────────────────── */
    #chat {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      padding: 16px;
      padding-bottom: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      -webkit-overflow-scrolling: touch;
    }
    .msg {
      max-width: 92%;
      line-height: 1.55;
      word-break: break-word;
    }
    .msg.user {
      align-self: flex-end;
      background: var(--surface-elevated);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 10px 16px;
      border-radius: 18px 18px 4px 18px;
      font-size: 0.95rem;
    }
    .msg.assistant {
      align-self: flex-start;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      max-width:  min(92%, 640px);
    }
    .msg.assistant .content {
      white-space: pre-wrap;
      font-size: 0.95rem;
    }
    .msg.assistant .content strong { color: var(--text); }
    .msg.assistant .section {
      margin-top: 14px;
      padding-left: 4px;
    }
    .msg.assistant .section-title {
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 600;
      font-size: 0.9rem;
      margin-bottom: 6px;
    }
    .msg.assistant .section-title .icon { width: 20px; height: 20px; flex-shrink: 0; }
    .msg.assistant .section.benefits .section-title { color: var(--green); }
    .msg.assistant .section.cautions .section-title { color: var(--yellow); }
    .msg.assistant .section ul { margin: 0; padding-left: 20px; }
    .msg.assistant .section li { margin-bottom: 6px; }
    .msg-actions {
      display: flex;
      align-items: center;
      gap: 4px;
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid var(--border);
    }
    .msg-action {
      width: 36px;
      height: 36px;
      border: none;
      background: none;
      color: var(--text-muted);
      cursor: pointer;
      border-radius: var(--radius-sm);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
    }
    .msg-action:hover { background: var(--surface-elevated); color: var(--text); }
    .msg-action svg { width: 18px; height: 18px; }
    .msg.system {
      align-self: center;
      color: var(--text-muted);
      font-size: 0.85rem;
      text-align: center;
    }
    .progress-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      padding: 12px;
      background: var(--surface-elevated);
      border-radius: var(--radius-sm);
      font-size: 0.85rem;
      color: var(--text-secondary);
    }
    .progress-step { color: var(--green); }

    /* ── Input area (Ask Anything... + paperclip, mic, send) ───────────────── */
    .input-area {
      padding: 12px 16px;
      padding-bottom: calc(12px + var(--safe-bottom));
      background: var(--surface);
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }
    .input-row {
      display: flex;
      align-items: flex-end;
      gap: 8px;
      background: var(--surface-elevated);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 8px 8px 8px 18px;
      min-height: var(--input-h);
    }
    #input {
      flex: 1;
      min-height: 32px;
      max-height: 120px;
      border: none;
      background: none;
      color: var(--text);
      font-size: 1rem;
      font-family: inherit;
      resize: none;
      outline: none;
    }
    #input::placeholder { color: var(--text-muted); }
    .input-row .icon-btn {
      width: 44px;
      height: 44px;
      border: none;
      background: none;
      color: var(--text-muted);
      cursor: pointer;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .input-row .icon-btn:hover { background: var(--border); color: var(--text); }
    .input-row .icon-btn svg { width: 22px; height: 22px; }
    .send-btn {
      width: 44px;
      height: 44px;
      border: none;
      background: var(--accent);
      color: white;
      cursor: pointer;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .send-btn:hover { background: var(--accent-hover); }
    .send-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .send-btn svg { width: 22px; height: 22px; }
    .search-row {
      margin-top: 8px;
      display: flex;
      align-items: center;
      gap: 6px;
      color: var(--text-muted);
      font-size: 0.85rem;
      cursor: pointer;
    }
    .search-row:hover { color: var(--text-secondary); }
    .search-row svg { width: 18px; height: 18px; flex-shrink: 0; }

    /* ── Session bar (when not in sidebar) ─────────────────────────────────── */
    .session-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    .session-bar input {
      width: 140px;
      min-width: 0;
      padding: 8px 12px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      background: var(--surface-elevated);
      color: var(--text);
      font-size: 0.85rem;
    }
    .session-bar .btn-sm {
      padding: 8px 12px;
      border-radius: var(--radius-sm);
      border: none;
      background: var(--accent);
      color: white;
      font-size: 0.85rem;
      font-weight: 500;
      cursor: pointer;
    }
    .session-bar .btn-sm:hover { background: var(--accent-hover); }
    .session-bar .btn-sm.secondary { background: var(--surface-elevated); color: var(--text); }
    .session-bar .btn-sm.secondary:hover { background: var(--border); }

    /* ── Responsive: show/hide tabs, session in drawer ─────────────────────── */
    @media (max-width: 600px) {
      .tabs { display: none; }
      .brand { font-size: 1rem; }
      .model-wrap .model-label { display: none; }
      .model-select { max-width: 110px; font-size: 0.8rem; }
      .msg { max-width: 95%; }
      .msg.assistant { max-width: 95%; }
    }
    @media (min-width: 601px) {
      .session-in-header { display: flex; }
    }
    .session-in-header { display: none; }
  </style>
</head>
<body>
  <header class="header">
    <div class="header-left">
      <button type="button" class="menu-btn" id="menuBtn" aria-label="Menu">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M3 12h18M3 18h18"/></svg>
      </button>
    </div>
    <div class="header-center">
      <div class="tabs">
        <button type="button" class="tab active" data-tab="chat" aria-label="Chat">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
          Chat
        </button>
        <button type="button" class="tab" data-tab="sessions" aria-label="Sessions">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/></svg>
          Sessions
        </button>
      </div>
      <span class="brand" style="display:none" id="brandFallback">Ollama Code</span>
    </div>
    <div class="header-right">
      <div class="session-in-header session-bar">
        <input type="text" id="sessionId" placeholder="Session ID">
        <button type="button" class="btn-sm" id="newSession">New</button>
        <button type="button" class="btn-sm secondary" id="loadSessions">List</button>
      </div>
      <div class="model-wrap" title="Choose model for replies">
        <label for="model" class="model-label">Model</label>
        <select id="model" class="model-select" aria-label="Choose model">
          <option value="">Loading...</option>
        </select>
      </div>
      <div class="avatar" aria-hidden="true">O</div>
    </div>
  </header>

  <div class="sidebar-overlay" id="sidebarOverlay"></div>
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <h2>Sessions</h2>
      <div style="display:flex;align-items:center;gap:8px">
        <button type="button" class="btn-sm" id="newSessionSidebar" style="padding:6px 12px;font-size:0.85rem">New</button>
        <button type="button" class="sidebar-close" id="sidebarClose" aria-label="Close">&times;</button>
      </div>
    </div>
    <div class="sidebar-model">
      <label for="modelSidebar" class="sidebar-label">Model</label>
      <select id="modelSidebar" class="model-select-sidebar" aria-label="Choose model"></select>
    </div>
    <div class="sidebar-list" id="sessionsList"></div>
  </aside>

  <main id="chat"></main>

  <div class="input-area">
    <div class="input-row">
      <textarea id="input" placeholder="Ask Anything..." rows="1"></textarea>
      <button type="button" class="icon-btn" id="attachBtn" aria-label="Attach" title="Attach (coming soon)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
      </button>
      <button type="button" class="icon-btn" id="micBtn" aria-label="Voice" title="Voice (coming soon)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
      </button>
      <button type="button" class="send-btn" id="send" aria-label="Send">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
      </button>
    </div>
    <div class="search-row" id="searchRow" title="Session list">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <span>Search sessions</span>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:14px;height:14px"><polyline points="6 9 12 15 18 9"/></svg>
    </div>
  </div>

  <script>
    const API = '';
    const _authToken = (new URLSearchParams(window.location.search).get('token') || '');

    function authHeaders(extra = {}) {
      const h = { ...extra };
      if (_authToken) h['X-Auth-Token'] = _authToken;
      return h;
    }

    const chat = document.getElementById('chat');
    const input = document.getElementById('input');
    const sendBtn = document.getElementById('send');
    const sessionIdInput = document.getElementById('sessionId');
    const modelSelect = document.getElementById('model');
    const menuBtn = document.getElementById('menuBtn');
    const sidebar = document.getElementById('sidebar');
    const sidebarOverlay = document.getElementById('sidebarOverlay');
    const sidebarClose = document.getElementById('sidebarClose');
    const sessionsList = document.getElementById('sessionsList');
    const loadSessionsBtn = document.getElementById('loadSessions');
    const searchRow = document.getElementById('searchRow');
    const tabs = document.querySelectorAll('.tab');
    const brandFallback = document.getElementById('brandFallback');
    const modelSidebar = document.getElementById('modelSidebar');
    let sessionEventSource = null;

    function replaceChatFromSession(session) {
      if (!session || !session.messages) return;
      const list = session.messages.filter(m => m.role !== 'system');
      chat.innerHTML = '';
      list.forEach(m => addMsg(m.role, m.content));
    }

    function subscribeToSessionEvents(sessionId) {
      if (sessionEventSource) {
        sessionEventSource.close();
        sessionEventSource = null;
      }
      if (!sessionId || !sessionId.trim()) return;
      const url = API + '/api/sessions/' + encodeURIComponent(sessionId.trim()) + '/events' + (_authToken ? '?token=' + encodeURIComponent(_authToken) : '');
      try {
        sessionEventSource = new EventSource(url);
        sessionEventSource.addEventListener('update', (e) => {
          try {
            const session = JSON.parse(e.data);
            replaceChatFromSession(session);
          } catch (_) {}
        });
        sessionEventSource.onerror = () => {
          if (sessionEventSource) { sessionEventSource.close(); sessionEventSource = null; }
        };
      } catch (_) {}
    }

    if (window.matchMedia('(max-width: 600px)').matches) {
      document.querySelector('.tabs').style.display = 'none';
      brandFallback.style.display = 'block';
    }

    tabs.forEach(t => {
      t.addEventListener('click', () => {
        tabs.forEach(x => x.classList.remove('active'));
        t.classList.add('active');
        if (t.dataset.tab === 'sessions') {
          openSidebar();
        }
      });
    });

    function openSidebar() {
      sidebar.classList.add('open');
      sidebarOverlay.classList.add('open');
      loadSessionsList();
      if (modelSidebar) modelSidebar.value = modelSelect.value;
    }
    menuBtn.addEventListener('click', openSidebar);
    sidebarOverlay.addEventListener('click', () => {
      sidebar.classList.remove('open');
      sidebarOverlay.classList.remove('open');
    });
    sidebarClose.addEventListener('click', () => {
      sidebar.classList.remove('open');
      sidebarOverlay.classList.remove('open');
    });
    searchRow.addEventListener('click', openSidebar);

    function addMsg(role, content, options = {}) {
      const div = document.createElement('div');
      div.className = `msg ${role}`;
      if (role === 'user') {
        div.textContent = content;
      } else if (role === 'assistant') {
        const contentEl = document.createElement('div');
        contentEl.className = 'content';
        contentEl.textContent = content;
        div.appendChild(contentEl);
        const actions = document.createElement('div');
        actions.className = 'msg-actions';
        actions.innerHTML = `
          <button type="button" class="msg-action" aria-label="Like" title="Like"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg></button>
          <button type="button" class="msg-action copy-btn" aria-label="Copy" title="Copy"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg></button>
          <button type="button" class="msg-action share-btn" aria-label="Share" title="Share"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg></button>
          <button type="button" class="msg-action" aria-label="More"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="1"/><circle cx="19" cy="12" r="1"/><circle cx="5" cy="12" r="1"/></svg></button>
        `;
        const copyBtn = actions.querySelector('.copy-btn');
        copyBtn.addEventListener('click', () => {
          navigator.clipboard.writeText(content).then(() => { copyBtn.title = 'Copied!'; setTimeout(() => { copyBtn.title = 'Copy'; }, 1500); });
        });
        const shareBtn = actions.querySelector('.share-btn');
        shareBtn.addEventListener('click', () => {
          if (navigator.share) {
            navigator.share({ title: 'Ollama Code', text: content.slice(0, 200) }).catch(() => {});
          } else {
            navigator.clipboard.writeText(content);
            shareBtn.title = 'Copied!';
            setTimeout(() => { shareBtn.title = 'Share'; }, 1500);
          }
        });
        div.appendChild(actions);
      } else {
        div.textContent = content;
      }
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
    }

    function addProgress(steps) {
      let el = document.getElementById('progress-bar');
      if (!el) {
        el = document.createElement('div');
        el.id = 'progress-bar';
        el.className = 'progress-bar';
        chat.appendChild(el);
      }
      el.innerHTML = steps.map(s => `<span class="progress-step">Step ${s.step}</span> ${s.label}`).join(' · ');
      chat.scrollTop = chat.scrollHeight;
    }

    function addToken(t) {
      let el = document.getElementById('streaming-msg');
      if (!el) {
        el = document.createElement('div');
        el.id = 'streaming-msg';
        el.className = 'msg assistant';
        const contentEl = document.createElement('div');
        contentEl.className = 'content';
        el.appendChild(contentEl);
        chat.appendChild(el);
      }
      const content = el.querySelector('.content');
      content.textContent = (content.textContent || '') + t;
      chat.scrollTop = chat.scrollHeight;
    }

    function finishStreaming() {
      const el = document.getElementById('streaming-msg');
      if (el) {
        el.id = '';
        const content = el.querySelector('.content');
        if (content && content.textContent) {
          const actions = document.createElement('div');
          actions.className = 'msg-actions';
          actions.innerHTML = `
            <button type="button" class="msg-action" aria-label="Like"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg></button>
            <button type="button" class="msg-action copy-btn" aria-label="Copy"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg></button>
            <button type="button" class="msg-action share-btn" aria-label="Share"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg></button>
            <button type="button" class="msg-action" aria-label="More"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="1"/><circle cx="19" cy="12" r="1"/><circle cx="5" cy="12" r="1"/></svg></button>
          `;
          const text = content.textContent;
          actions.querySelector('.copy-btn').addEventListener('click', () => { navigator.clipboard.writeText(text); });
          actions.querySelector('.share-btn').addEventListener('click', () => {
            if (navigator.share) navigator.share({ title: 'Ollama Code', text: text.slice(0, 200) }).catch(() => {});
            else navigator.clipboard.writeText(text);
          });
          el.appendChild(actions);
        }
      }
    }

    function uuid() {
      return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c => {
        const r = Math.random() * 16 | 0;
        const v = c === 'x' ? r : (r & 0x3 | 0x8);
        return v.toString(16);
      });
    }

    function doNewSession() {
      sessionIdInput.value = uuid();
      chat.innerHTML = '';
      addMsg('system', 'New session. Ask anything.');
      subscribeToSessionEvents(sessionIdInput.value);
      sidebar.classList.remove('open');
      sidebarOverlay.classList.remove('open');
    }
    document.getElementById('newSession').onclick = doNewSession;
    document.getElementById('newSessionSidebar').onclick = doNewSession;

    async function loadSessionsList() {
      try {
        const res = await fetch(API + '/api/sessions', { headers: authHeaders() });
        const { sessions } = await res.json();
        sessionsList.innerHTML = (sessions || []).length
          ? (sessions || []).map(s =>
              `<button type="button" class="sidebar-item" data-id="${s.sessionId}">${s.name || s.sessionId.slice(0, 8)}<small>${s.model || ''}</small></button>`
            ).join('')
          : '<p style="padding:16px;color:var(--text-muted);font-size:0.9rem">No sessions yet</p>';
        sessionsList.querySelectorAll('.sidebar-item[data-id]').forEach(b => {
          b.addEventListener('click', () => {
            sessionIdInput.value = b.dataset.id;
            sidebar.classList.remove('open');
            sidebarOverlay.classList.remove('open');
            loadSession(b.dataset.id);
          });
        });
      } catch (e) {
        sessionsList.innerHTML = '<p style="padding:16px;color:var(--red);font-size:0.9rem">Failed to load sessions</p>';
      }
    }

    loadSessionsBtn.addEventListener('click', openSidebar);

    async function loadSession(id) {
      try {
        const res = await fetch(API + '/api/sessions/' + encodeURIComponent(id), { headers: authHeaders() });
        if (!res.ok) return;
        const data = await res.json();
        const { messages, model: sessionModel } = data;
        chat.innerHTML = '';
        (messages || []).filter(m => m.role !== 'system').forEach(m => addMsg(m.role, m.content));
        if (sessionModel) {
          modelSelect.value = sessionModel;
          syncModelFromHeader();
        }
        subscribeToSessionEvents(id);
      } catch (e) {
        addMsg('system', 'Failed to load: ' + e.message);
      }
    }

    function setModelOptions(models, current) {
      const opts = (models || []).map(m =>
        `<option value="${m.name}" ${m.name === current ? 'selected' : ''}>${m.name}</option>`
      ).join('');
      modelSelect.innerHTML = opts || '<option value="">Default</option>';
      if (modelSidebar) {
        modelSidebar.innerHTML = opts || '<option value="">Default</option>';
        modelSidebar.value = modelSelect.value;
      }
    }

    function syncModelFromHeader() {
      if (modelSidebar && modelSidebar.value !== modelSelect.value) {
        modelSidebar.value = modelSelect.value;
      }
    }

    function syncModelFromSidebar() {
      if (modelSidebar && modelSelect.value !== modelSidebar.value) {
        modelSelect.value = modelSidebar.value;
      }
    }

    async function loadModels() {
      try {
        const res = await fetch(API + '/api/models', { headers: authHeaders() });
        const { models, current } = await res.json();
        setModelOptions(models, current);
      } catch {
        setModelOptions([], null);
      }
    }

    if (modelSidebar) {
      modelSidebar.addEventListener('change', () => { syncModelFromSidebar(); });
    }
    modelSelect.addEventListener('change', () => { syncModelFromHeader(); });

    sendBtn.addEventListener('click', send);
    input.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
    });

    input.addEventListener('input', () => {
      input.style.height = 'auto';
      input.style.height = Math.min(input.scrollHeight, 120) + 'px';
    });

    async function send() {
      const msg = input.value.trim();
      if (!msg) return;
      let sid = sessionIdInput.value.trim();
      if (!sid) {
        sid = uuid();
        sessionIdInput.value = sid;
        subscribeToSessionEvents(sid);
      }

      addMsg('user', msg);
      input.value = '';
      input.style.height = 'auto';
      sendBtn.disabled = true;

      const progressSteps = [];
      try {
        const res = await fetch(API + '/api/sessions/' + encodeURIComponent(sid) + '/message', {
          method: 'POST',
          headers: authHeaders({ 'Content-Type': 'application/json' }),
          body: JSON.stringify({ message: msg, model: modelSelect.value || undefined }),
        });
        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          throw new Error(err.error || res.statusText);
        }

        const reader = res.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '';
        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          buffer += decoder.decode(value, { stream: true });
          const lines = buffer.split('\n');
          buffer = lines.pop() || '';
          for (const line of lines) {
            if (!line.trim()) continue;
            try {
              const ev = JSON.parse(line);
              if (ev.type === 'progress') {
                progressSteps.push(ev);
                addProgress(progressSteps);
              } else if (ev.type === 'token') {
                addToken(ev.text || '');
              } else if (ev.type === 'tool') {
                progressSteps.push({ step: ev.step || progressSteps.length + 1, label: ev.tool + ': ' + (ev.detail || '').slice(0, 40) });
                addProgress(progressSteps);
              } else if (ev.type === 'done') {
                finishStreaming();
                const pb = document.getElementById('progress-bar');
                if (pb) pb.remove();
              } else if (ev.type === 'messages' && ev.messages) {
                const last = ev.messages.filter(m => m.role === 'assistant').pop();
                if (last && !document.getElementById('streaming-msg')) addMsg('assistant', last.content);
              } else if (ev.type === 'error') {
                addMsg('system', 'Error: ' + (ev.message || 'Unknown'));
              }
            } catch (_) {}
          }
        }
      } catch (e) {
        addMsg('system', 'Error: ' + e.message);
      }
      sendBtn.disabled = false;
    }

    loadModels();
    if (sessionIdInput.value) loadSession(sessionIdInput.value);
  </script>
</body>
</html>
